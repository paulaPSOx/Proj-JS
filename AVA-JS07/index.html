<body>
    <div id="mensagem"></div>
        <h1> Menu de Navegação|</h1>

    <form id="menuForm">
        <label for="url">Escolha um site do Google:</label>
        <select id="url" name="url">
            <option value="https://www.google.com">Google</option>
            <option value="https://translate.google.com.br/?hl=pt-BR">Google Tradutor</option>
            <option value="https://www.google.com/intl/pt-BR/gmail/about/">Google E-mail</option>
            <option value="https://www.google.com.br/maps/preview">Google Maps</option>
            <option value="https://www.google.com/intl/pt-BR/photos/about/">Google Photos</option>
            <option value="https://www.google.com/intl/pt-br/drive/about.html/">Google Drive</option>
            <option value="https://meet.google.com/">Google Meet</option>
            <option value="https://play.google.com/store/games?hl=pt_BR&gl=US">Google Play</option>
            <option value="https://www.google.com/intl/pt-BR/forms/about/">Google Forms</option>
        </select>
        <button type="button" onclick="navegar()">Ir para o site</button>
    </form>
